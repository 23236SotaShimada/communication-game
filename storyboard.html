<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コミュニケーション巻き戻し 絵コンテ</title>
<style>
:root{--bg:#080912;--panel:#0b1024;--ink:#12131a;--muted:#5d6475;--line:#33384a;--blue:#6af;--gold:#ffd34f;--red:#f66;--green:#6f6;--paper:#fff;--paper-soft:#f7f8fb}*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:'Hiragino Kaku Gothic ProN','Yu Gothic','Meiryo',sans-serif}body{background:radial-gradient(circle at 18% 15%,rgba(80,140,255,.24),transparent 24%),radial-gradient(circle at 82% 12%,rgba(255,80,210,.18),transparent 26%),radial-gradient(circle at 70% 82%,rgba(90,255,170,.14),transparent 28%),var(--bg);color:#fff}.toolbar{position:sticky;top:0;z-index:20;display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:wrap;padding:12px 14px;background:rgba(3,5,15,.82);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.08);box-shadow:0 8px 36px rgba(0,0,0,.35)}.toolbar button,.toolbar a{position:relative;overflow:hidden;border:2px solid var(--blue);border-radius:999px;background:linear-gradient(135deg,#1a3060,#102040);color:#fff;padding:10px 20px;text-decoration:none;font-size:13px;font-weight:800;font-family:inherit;cursor:pointer;box-shadow:0 0 24px rgba(100,170,255,.18)}.toolbar button::after,.toolbar a::after{content:'';position:absolute;inset:-70% -35%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.38),transparent);transform:translateX(-90%) rotate(18deg);animation:shine 2.4s linear infinite}.toolbar button:hover,.toolbar a:hover{transform:translateY(-1px);box-shadow:0 10px 32px rgba(100,170,255,.28)}.hint{color:#aeb7d0;font-size:12px}.stage-nav{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}.stage-nav a{border-color:rgba(255,255,255,.18);background:rgba(255,255,255,.07);padding:8px 12px;color:#cfe4ff;box-shadow:none}.stage-nav a::after{display:none}.screen-title{text-align:center;margin:24px auto 18px;padding:0 18px}.screen-title .badge{display:inline-block;border:1px solid var(--blue);border-radius:999px;color:var(--blue);font-size:11px;letter-spacing:4px;text-transform:uppercase;padding:4px 14px;margin-bottom:10px}.screen-title h1{margin:0;font-size:34px;font-weight:1000;background:linear-gradient(90deg,#fff,#adf,#fffd9b,#ffa7ee,#fff);background-size:300% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:titleRainbow 3.2s linear infinite}.screen-title p{margin:8px 0 0;color:#b6bfd4;font-size:13px}.pages{padding:0 0 32px}.page{width:210mm;height:297mm;margin:0 auto 18px;padding:8mm 9mm;background:var(--paper);color:var(--ink);box-shadow:0 14px 55px rgba(0,0,0,.45);overflow:hidden;break-after:page;page-break-after:always;display:grid;grid-template-rows:30mm 180mm 53mm;gap:4mm}.page:last-child{break-after:auto;page-break-after:auto}.sheet-head{border:1.4px solid var(--line);border-radius:3px;overflow:hidden;background:linear-gradient(180deg,#ffffff,#f1f4fb)}.doc-row{display:flex;justify-content:space-between;gap:8px;align-items:center;padding:3mm 4mm 2mm;border-bottom:1px solid #cdd3e0}.doc-title{font-size:8.2pt;font-weight:800;letter-spacing:.02em;color:#26304a}.doc-badge{font-size:7pt;color:#fff;background:linear-gradient(135deg,#1a3060,#102040);border:1px solid #6af;border-radius:999px;padding:2px 8px;white-space:nowrap}.stage-title{padding:2.8mm 4mm 1.5mm;font-size:15pt;line-height:1.1;font-weight:1000;color:#080912}.meta{padding:0 4mm 2.4mm;font-size:7.2pt;line-height:1.4;color:#3f4658}.blank{display:inline-block;border-bottom:1px solid #777;min-width:24mm;height:8px;vertical-align:-1px}.wide{min-width:70mm}.cb{display:inline-block;width:8px;height:8px;border:1px solid #555;margin:0 2px -1px 6px}.cb.checked::after{content:'✓';display:block;font-size:7pt;line-height:7px;text-align:center}.board{display:grid;grid-template-columns:56% 44%;grid-template-rows:7mm 50mm 36mm 52mm 35mm;border:1.4px solid var(--line);overflow:hidden}.th,.cell{border-right:1.2px solid var(--line);border-bottom:1.2px solid var(--line);padding:2.1mm 2.6mm}.th:nth-child(2),.cell:nth-child(2n){border-right:0}.cell:nth-last-child(-n+2){border-bottom:0}.th{display:flex;align-items:center;justify-content:center;background:#dfe6f7;font-size:8pt;font-weight:900;color:#18213b}.cell{font-size:7.2pt;line-height:1.34;background:#fff}.visual{background:linear-gradient(180deg,#fff,#fafbff)}.desc{background:#fff}.place{font-size:6.7pt;color:#667087;margin-bottom:1.4mm}.chars{font-size:18pt;line-height:1;margin-bottom:1mm}.names{font-size:6.8pt;color:#667087;margin-bottom:1.4mm}.balloon{display:inline-block;max-width:100%;border:1px solid #9298a8;border-radius:5px;padding:1.3mm 1.8mm;margin:0 0 1mm;background:#fff;box-decoration-break:clone;-webkit-box-decoration-break:clone}.balloon.bad{border-color:#dc8b8b;background:#fff1f1}.balloon.good{border-color:#5cba8f;background:#effff6}.balloon.system{border-color:#7d88aa;background:#f0f4ff;font-weight:800}.desc-head{display:inline-block;margin-bottom:1.4mm;padding:1mm 2mm;border-radius:999px;background:#eef3ff;color:#1a3060;font-weight:900;font-size:7.2pt}.stamp{display:inline-block;margin-top:.5mm;padding:.8mm 2mm;border-radius:999px;font-weight:900;font-size:7pt}.stamp.bad{color:#9c1515;background:#ffecec;border:1px solid #ef9b9b}.stamp.good{color:#075c30;background:#e9fff2;border:1px solid #80d9a8}.note{border:1.4px solid var(--line);border-radius:4px;background:#fff;overflow:hidden}.note-title{padding:2.2mm 3mm;background:linear-gradient(135deg,#1a3060,#102040);color:#fff;font-size:8.2pt;font-weight:900;border-bottom:1px solid #1d2c54}.note-body{height:calc(100% - 9mm);padding:2.6mm 3mm;font-size:7.4pt;line-height:1.48;background:linear-gradient(180deg,#fff,#f6f8ff);color:#1b2030}.note-body strong{color:#1a3060}.only-print{display:none}@keyframes titleRainbow{to{background-position:300% 0}}@keyframes shine{0%{transform:translateX(-90%) rotate(18deg)}55%,100%{transform:translateX(95%) rotate(18deg)}}@media print{@page{size:A4;margin:0}html,body{width:210mm;height:auto;margin:0!important;padding:0!important;background:#fff!important;color:#000!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}.toolbar,.screen-title{display:none!important}.pages{display:block!important;margin:0!important;padding:0!important}.page{width:210mm!important;height:297mm!important;margin:0!important;padding:8mm 9mm!important;box-shadow:none!important;border:0!important;border-radius:0!important;overflow:hidden!important;break-after:page!important;page-break-after:always!important;break-inside:avoid!important;page-break-inside:avoid!important}.page:last-child{break-after:auto!important;page-break-after:auto!important}.only-print{display:inline}.only-screen{display:none!important}}
</style>
</head>
<body>
<div class="toolbar">
  <button onclick="window.print()">PDF保存 / 印刷</button>
  <a href="./index.html">ゲームへ戻る</a>
  <div class="stage-nav">
    <a href="#stage-1">1</a><a href="#stage-2">2</a><a href="#stage-3">3</a><a href="#stage-4">4</a>
  </div>
  <span class="hint">印刷設定は「用紙:A4」「余白:なし」「背景グラフィック:ON」推奨</span>
</div>
<header class="screen-title">
  <div class="badge">Storyboard Export</div>
  <h1>コミュニケーション巻き戻し 絵コンテ</h1>
  <p>プレビュー画面はゲーム側の暗いUIに寄せ、PDF出力部分だけA4固定レイアウトにしています。</p>
</header>
<main class="pages" id="pages"></main>
<script>
const storyboards=[
{stage:'ステージ1：文脈無視の乱入',place:'教室　発表テーマ相談中',chars:'🧑‍🤝‍🧑　　🚶',names:'Aさん・Bさん　　Cさん',summary:'AさんとBさんが授業発表について相談しているところへ、Cさんが文脈を確認せずに乱入する。',point:'会話に途中参加するとき、現在の話題と参加してよいかを確認しないと、相手は何の話か分からなくなる。',note:'途中参加では、「今何の話をしているか」「自分が入ってよいか」を確認することが重要である。',rows:[{head:'アカン例',visual:[['Aさん','次の発表、コミュニケーション不全の例を寸劇にするってどう？',''],['Bさん','相手の話題を無視して、急に別の話をする例が分かりやすそう。',''],['Cさん','あんたって妹と最近どうなん','bad'],['Aさん・Bさん','？','bad'],['Cさん','🛬🕋','bad']],desc:'Cさんは、AさんとBさんが何を話しているかを確認せず、急に私的な話題を出している。さらに絵文字だけで返すため、意図が共有されず会話が止まる。'},{head:'失敗ポップアップ',visual:[['画面','失敗した！会話に入る直前からやり直せ。','system']],desc:'失敗後、説明役は出さずにポップアップでやり直しを促す。プレイヤーは同じ場面から別の入り方を選ぶ。'},{head:'修復後',visual:[['Cさん','今、授業の発表について話してた？ 途中から聞こえたんだけど、入ってもいい？','good'],['Aさん','うん、コミュニケーション不全の例を考えてた。',''],['Bさん','入って大丈夫。何か案ある？','']],desc:'Cさんは先に話題を確認し、会話に入る許可を取る。これにより、乱入ではなく自然な参加になる。'},{head:'結果',visual:[['画面','いい感じ！ 会話が止まらず、次の場面へ進めるようになりました。','good']],desc:'修復後は、Aさん・Bさんの文脈を壊さずにCさんが会話へ入れる。'}]},
{stage:'ステージ2：曖昧な作業依頼',place:'図書館　発表資料づくり',chars:'🧑　　👩',names:'Aさん　　Bさん',summary:'AさんがBさんに資料作成を頼むが、「いい感じ」という曖昧な依頼により認識ズレが起きる。',point:'依頼では、担当範囲・期限・完成条件を共有しないと、相手の解釈に任せることになり、結果がズレる。',note:'「いい感じ」「任せる」「適当に」は便利だが、作業依頼ではズレを生みやすい。',rows:[{head:'アカン例',visual:[['Aさん','俺、用事あるから先に帰るわ。資料、いい感じにしといて。','bad'],['Bさん','いい感じって、どこまで？',''],['Aさん','そこは任せる。発表で困らない感じ。','bad'],['Bさん','えっと……じゃあデザインだけ整えておくね。','']],desc:'Aさんは依頼内容を具体化せず、Bさんに判断を丸投げしている。Bさんは何を優先すべきか分からない。'},{head:'失敗ポップアップ',visual:[['翌日','なんで内容が増えてないの？ 発表で困るじゃん。','bad'],['画面','失敗した！作業を頼む直前からやり直せ。','system']],desc:'翌日に認識違いが発覚する。依頼時点で条件が共有されていないことが失敗の原因。'},{head:'修復後',visual:[['Aさん','Bさんはスライド3〜5枚目の文章を短くして、今日20時までに共有してくれる？ 画像探しは俺が帰ってからやる。','good'],['Bさん','それなら分かる。文章の整理だけ今日20時までね。',''],['Aさん','ありがとう。終わったらチャットに送って。確認する。','']],desc:'Aさんは、担当範囲・期限・自分がやる部分を明確にしている。Bさんは何をすればよいか判断できる。'},{head:'結果',visual:[['画面','いい感じ！ 会話が止まらず、次の場面へ進めるようになりました。','good']],desc:'曖昧な依頼が、具体的な作業依頼に変わった。'}]},
{stage:'ステージ3：発表中の助け方ミス',place:'発表本番　前に出て発表中',chars:'👩‍🏫　　🧑',names:'Bさん　　Aさん',summary:'発表中にBさんが詰まったとき、Aさんが強く割り込んで発表を奪ってしまう。',point:'相手を助けるつもりでも、否定して主導権を奪うと、相手の立場を壊してしまう。',note:'相手が詰まったときは、否定ではなく「補足」「言い換えると」で支援する。',rows:[{head:'アカン例',visual:[['Bさん','えっと、この場面では……相手の……えー……',''],['Aさん','そこ違う。もういい、俺が説明する。','bad'],['Bさん','え……','bad'],['観客','助けたというより、発表を奪った感じになってる……','bad']],desc:'AさんはBさんを助けようとしているが、「そこ違う」「もういい」と否定しているため、Bさんの発表者としての立場を奪っている。'},{head:'失敗ポップアップ',visual:[['画面','失敗した！Bさんが詰まった場面からやり直せ。','system']],desc:'Bさんを助ける場面に戻る。発表を奪わずに補足する選択が必要。'},{head:'修復後',visual:[['Aさん','補足すると、この場面では「相手の話題を確認せずに入る」と会話が止まりやすい、という例です。','good'],['Bさん','そうです。なので、改善後は最初に「今の話に入ってもいい？」と確認します。',''],['Aさん','Bさんの説明に付け加えると、相手の立場を残したまま話すことも大事です。','']],desc:'Aさんは「補足」として入ることで、Bさんの説明を壊さずに助けている。'},{head:'結果',visual:[['画面','いい感じ！ 会話が止まらず、次の場面へ進めるようになりました。','good']],desc:'助ける行為が、支配ではなく支援として伝わる。'}]},
{stage:'ステージ4：前提共有なしの「結局」',place:'放課後　教室の出口付近',chars:'🧑　　🎒',names:'Aさん　　Dさん',summary:'Dさんが「結局さ、夜店いくん？」と聞くが、「結局」の前提が共有されておらず、Aさんには何の話か分からない。',point:'「結局」は、過去の会話や迷っていた内容を相手も覚えている前提で使われるため、前提が共有されていないと通じない。',note:'「結局」のような省略語は、相手も同じ文脈を持っているときだけ通じる。前提が怪しいときは、「何の件か」を先に言う。',rows:[{head:'アカン例',visual:[['Aさん','今日の発表、資料の順番だけ帰る前に確認しよう。',''],['Dさん','結局さ、夜店いくん？','bad'],['Aさん','え、夜店？','bad'],['Dさん','だから、結局どうするんって話。','bad'],['Aさん','ごめん、何の話か分からない。今は発表資料の話をしてた。','']],desc:'Dさんは「結局」という言葉で過去の話題を前提にしているが、Aさんにはその前提が見えていない。'},{head:'失敗ポップアップ',visual:[['画面','失敗した！「結局」の前提を共有する直前からやり直せ。','system']],desc:'「結局」と聞く前に、何について確認したいのかを言葉にする必要がある。'},{head:'修復後',visual:[['Dさん','ごめん、発表の話の途中で一つだけ確認していい？ この前話してた、駅前の祭りの夜店に行くかどうかの件なんだけど、今日決める？','good'],['Aさん','ああ、その話ね。発表資料を確認したあとで決めよう。',''],['Dさん','了解。じゃあ資料の確認が終わったらまた聞く。','']],desc:'Dさんは、急に別話題へ移る前に断りを入れ、さらに「夜店」が何の件なのかを具体的に説明している。'},{head:'結果',visual:[['画面','いい感じ！ 会話が止まらず、次の場面へ進めるようになりました。','good']],desc:'「結局」の裏にあるコンテキストが共有されたため、Aさんが反応できる。'}]}
];
function esc(v){return String(v).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function balloon([name,text,type]){return `<span class="balloon ${type||''}">${esc(name)}：「${esc(text)}」</span><br>`;}
function rowBlock(r,i,s){const head=i===0?`<div class="place">📍 ${esc(s.place)}</div><div class="chars">${s.chars}</div><div class="names">${esc(s.names)}</div>`:'';const stamp=i===0?'<span class="stamp bad">失敗</span>':i===2?'<span class="stamp good">修復</span>':'';return `<div class="cell visual">${head}${r.visual.map(balloon).join('')}${stamp}</div><div class="cell desc"><div class="desc-head">${esc(r.head)}</div><div>${esc(r.desc)}</div></div>`;}
function page(s,i){return `<section class="page" id="stage-${i+1}"><header class="sheet-head"><div class="doc-row"><div class="doc-title">コミュニケーションスキル中間発表　絵コンテ</div><div class="doc-badge">STAGE ${i+1} / ${storyboards.length}</div></div><div class="stage-title">${esc(s.stage)}</div><div class="meta">チーム名（<span class="blank"></span>）　メンバー（<span class="blank wide"></span>）<br>当日の発表形式 <span class="cb"></span>動画 <span class="cb checked"></span>寸劇 <span class="cb"></span>プレゼン <span class="cb"></span>その他（<span class="blank"></span>）</div></header><section class="board"><div class="th">絵・図等</div><div class="th">説明</div>${s.rows.map((r,idx)=>rowBlock(r,idx,s)).join('')}</section><footer class="note"><div class="note-title">補足説明</div><div class="note-body"><strong>場面：</strong>${esc(s.summary)}<br><strong>コミュニケーション不全ポイント：</strong>${esc(s.point)}<br><strong>まとめ：</strong>${esc(s.note)}</div></footer></section>`;}
document.getElementById('pages').innerHTML=storyboards.map(page).join('');
</script>
</body>
</html>
