<!DOCTYPE html>
<html lang="ja">

<title>コミュニケーションスキル中間発表 絵コンテ</title>
<style>
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:'Hiragino Kaku Gothic ProN','Yu Gothic','Meiryo',sans-serif}body{background:radial-gradient(circle at 18% 15%,rgba(80,140,255,.24),transparent 24%),radial-gradient(circle at 82% 12%,rgba(255,80,210,.18),transparent 26%),radial-gradient(circle at 70% 82%,rgba(90,255,170,.14),transparent 28%),#080912;color:#fff}.toolbar{position:sticky;top:0;z-index:20;display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:wrap;padding:12px 14px;background:rgba(3,5,15,.84);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.08);box-shadow:0 8px 36px rgba(0,0,0,.35)}.toolbar button,.toolbar a{position:relative;overflow:hidden;border:2px solid #6af;border-radius:999px;background:linear-gradient(135deg,#1a3060,#102040);color:#fff;padding:10px 20px;text-decoration:none;font-size:13px;font-weight:800;font-family:inherit;cursor:pointer;box-shadow:0 0 24px rgba(100,170,255,.18)}.toolbar button:hover,.toolbar a:hover{transform:translateY(-1px);box-shadow:0 10px 32px rgba(100,170,255,.28)}.stage-nav{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}.stage-nav a{border-color:rgba(255,255,255,.18);background:rgba(255,255,255,.07);padding:8px 12px;color:#cfe4ff;box-shadow:none}.hint{color:#aeb7d0;font-size:12px}.screen-title{text-align:center;margin:24px auto 18px;padding:0 18px}.screen-title .badge{display:inline-block;border:1px solid #6af;border-radius:999px;color:#6af;font-size:11px;letter-spacing:4px;text-transform:uppercase;padding:4px 14px;margin-bottom:10px}.screen-title h1{margin:0;font-size:34px;font-weight:1000;background:linear-gradient(90deg,#fff,#adf,#fffd9b,#ffa7ee,#fff);background-size:300% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:titleRainbow 3.2s linear infinite}.screen-title p{margin:8px 0 0;color:#b6bfd4;font-size:13px}.pages{padding:0 0 32px}.page{position:relative;width:210mm;height:297mm;margin:0 auto 18px;background:#fff;color:#000;box-shadow:0 14px 55px rgba(0,0,0,.45);overflow:hidden;break-after:page;page-break-after:always}.page:last-child{break-after:auto;page-break-after:auto}.tpl-title{position:absolute;left:12.8mm;top:16.8mm;font-size:12pt;line-height:1;text-decoration:underline;font-weight:400;letter-spacing:0}.team-line{position:absolute;left:12.8mm;right:12.8mm;top:25.2mm;font-size:12pt;line-height:1.1;font-weight:400;white-space:nowrap}.format-line{position:absolute;left:12.8mm;right:12.8mm;top:33.1mm;font-size:12pt;line-height:1.1;font-weight:400;white-space:nowrap}.storyboard{position:absolute;left:12.8mm;top:40.2mm;width:184.4mm;height:204.8mm;border:1px solid #000;display:grid;grid-template-columns:50% 50%;grid-template-rows:6.2mm repeat(4,49.65mm);overflow:hidden;background:#fff}.head{display:flex;align-items:center;justify-content:center;background:#bfbfbf;border-bottom:1px solid #000;font-size:12pt;line-height:1}.head.left{border-right:1px solid #000}.cell{padding:2mm 2.4mm;font-size:6.7pt;line-height:1.33;border-bottom:1px solid #000;overflow:hidden;white-space:normal}.cell.visual{border-right:1.4px dashed #000}.cell.desc{border-right:0}.row4{border-bottom:0}.scene-name{font-weight:700;margin-bottom:1mm}.place{margin-bottom:1mm}.dialogue{margin:0 0 .7mm}.label{font-weight:700}.supplement-title{position:absolute;left:12.8mm;top:247.0mm;font-size:12pt;line-height:1.1;font-weight:400}.supplement-body{position:absolute;left:12.8mm;right:12.8mm;top:254.2mm;font-size:7.2pt;line-height:1.55;color:#000}.supplement-body strong{font-weight:700}.only-print{display:none}@keyframes titleRainbow{to{background-position:300% 0}}@media print{@page{size:A4;margin:0}html,body{width:210mm;margin:0!important;padding:0!important;background:#fff!important;color:#000!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}.toolbar,.screen-title{display:none!important}.pages{display:block!important;margin:0!important;padding:0!important}.page{width:210mm!important;height:297mm!important;margin:0!important;box-shadow:none!important;overflow:hidden!important;break-after:page!important;page-break-after:always!important;break-inside:avoid!important;page-break-inside:avoid!important}.page:last-child{break-after:auto!important;page-break-after:auto!important}.only-print{display:inline}.only-screen{display:none!important}}
</style>
</head>
<body>
<div class="toolbar">
  <button onclick="window.print()">PDF保存 / 印刷</button>
  <a href="./index.html">ゲームへ戻る</a>
  <div class="stage-nav"><a href="#stage-1">1</a><a href="#stage-2">2</a><a href="#stage-3">3</a><a href="#stage-4">4</a></div>
  <span class="hint">PDFは添付テンプレートと同じA4固定レイアウトです。印刷時は「余白なし」「背景グラフィックON」推奨。</span>
</div>
<header class="screen-title">
  <div class="badge">Storyboard Export</div>
  <h1>コミュニケーション巻き戻し 絵コンテ</h1>
  <p>PDFになる用紙部分は添付テンプレートの白黒レイアウトを維持しています。</p>
</header>
<main class="pages" id="pages"></main>
<script>
const storyboards=[
{stage:'ステージ1：文脈無視の乱入',place:'教室　発表テーマ相談中',summary:'授業発表の相談中、途中から来たCさんが別の話題を突然出してしまう場面。',point:'途中参加する側が、今の話題と参加してよいかを確認しないため、相手は発言の意図を受け取れない。',note:'改善では、話題確認と参加許可を先に行うことで、乱入ではなく自然な参加として会話が続く。',rows:[{head:'場面設定',visual:['AさんとBさんが机を挟んで、授業発表のテーマを相談している。','二人は「コミュニケーション不全」を寸劇で表す案を考えている。','そこへCさんが横から近づいてくる。'],desc:'この時点で、AさんとBさんの間には「発表テーマを相談している」という共有された文脈がある。一方、Cさんはその文脈にまだ入っていない。'},{head:'問題発生',visual:['Cさんが前置きなしに私的な話題を出す。','AさんとBさんは、急に何の話をされたのか分からず反応できない。','Cさんはさらに意味の分からない返しをして、場が止まる。'],desc:'ダメだった理由は、Cさんが「自分が話したいこと」だけを出し、相手が今どの文脈にいるかを確認していないこと。話題の接続がないため、受け手は返答の入口を失う。'},{head:'改善',visual:['Cさんは、まず二人が何の話をしていたのか確認する。','次に「入ってもいいか」を聞き、相手が受け入れられる状態を作る。','AさんとBさんは、Cさんを会話へ自然に招き入れる。'],desc:'改善点は、発言内容そのものを変える前に、会話へ入る手続きを作ること。話題確認と参加許可があると、Cさんの発言は乱入ではなく参加になる。'},{head:'結末',visual:['三人で発表テーマの相談を続ける。','Cさんも、相手の話題を壊さない形で意見を出せるようになる。'],desc:'会話に途中参加するときは、最初の一言で相手の文脈に合わせる必要がある。文脈が共有されれば、新しい意見も受け取ってもらいやすくなる。'}]},
{stage:'ステージ2：曖昧な作業依頼',place:'図書館　発表資料づくり',summary:'AさんがBさんに資料作成を頼むが、依頼の条件が曖昧で作業結果がズレる場面。',point:'依頼する側が、担当範囲・期限・完成条件を共有しないため、相手は自分の解釈で進めるしかなくなる。',note:'改善では、「誰が」「いつまでに」「何をどこまでやるか」を明確にして、認識のズレを減らす。',rows:[{head:'場面設定',visual:['AさんとBさんが図書館で発表資料を作っている。','Aさんは先に帰る必要があり、残りの作業をBさんに頼もうとしている。','Bさんは、どの作業を任されるのかまだ分かっていない。'],desc:'共同作業では、作業を頼む側と受ける側で「完成」のイメージが一致しているとは限らない。この場面では、依頼前の条件共有が重要になる。'},{head:'問題発生',visual:['Aさんは「いい感じにしておいて」とだけ頼む。','Bさんは、文章整理なのか、デザイン調整なのか、内容追加なのか判断できない。','翌日、Aさんの期待とBさんの作業結果が食い違う。'],desc:'ダメだった理由は、「いい感じ」が人によって違うこと。Aさんは内容の追加まで期待しているが、Bさんは見た目の整理だと解釈している。曖昧な言葉が認識ズレを生んでいる。'},{head:'改善',visual:['Aさんは、Bさんの担当範囲を具体的に伝える。','期限と提出方法も合わせて伝える。','Aさんが自分で行う作業も明確に分ける。'],desc:'改善点は、依頼を感覚的な表現で終わらせず、作業単位に分けて伝えること。担当・期限・完成条件が明確なら、Bさんは迷わず行動できる。'},{head:'結末',visual:['Bさんは自分の担当作業を理解して進める。','Aさんも、戻ってから確認すべき範囲を把握できる。','二人の作業が重複せず、発表準備が進む。'],desc:'作業依頼では、相手の能力に任せることと、条件を曖昧にすることは別である。条件を明確にするほど、相手は安心して任された部分に集中できる。'}]},
{stage:'ステージ3：発表中の助け方ミス',place:'発表本番　前に出て発表中',summary:'発表中にBさんが言葉に詰まったとき、Aさんが助け方を誤って発表を奪ってしまう場面。',point:'助ける側が相手を否定して主導権を奪うため、相手の立場や発表者としての役割が壊れてしまう。',note:'改善では、「訂正」ではなく「補足」として入ることで、相手の立場を残したまま支援する。',rows:[{head:'場面設定',visual:['AさんとBさんが前に立ち、クラスに向けて発表している。','Bさんの担当部分で、言葉が出てこなくなり一瞬止まる。','Aさんは横でそれに気づく。'],desc:'この場面では、Aさんが助けること自体は悪くない。問題は、助け方によってBさんの発表者としての立場を守れるかどうかである。'},{head:'問題発生',visual:['Aさんが「そこ違う」「もういい」と強く割り込む。','Bさんは発表を続ける機会を失い、黙ってしまう。','聞いている側にも、Aさんが発表を奪ったように見える。'],desc:'ダメだった理由は、Aさんの発言が支援ではなく否定になっていること。内容は合っていても、相手を押しのける形で話すと、チーム発表としての印象が悪くなる。'},{head:'改善',visual:['Aさんは「補足すると」と前置きして短く助ける。','Bさんはその補足を受けて、自分の説明に戻る。','Aさんは必要な分だけ補い、主役をBさんに戻す。'],desc:'改善点は、相手の説明を奪わず、足りない部分だけを支えること。「補足」「言い換えると」のような前置きがあると、相手の立場を残したまま助けられる。'},{head:'結末',visual:['Bさんは落ち着いて発表を続ける。','Aさんの助けも、チーム内の連携として自然に見える。','聞き手にも、二人で発表していることが伝わる。'],desc:'助ける場面では、正しい内容を言うだけでなく、相手の役割を残すことが大切である。支援は、相手を消すのではなく続けやすくする行動である。'}]},
{stage:'ステージ4：前提共有なしの「結局」',place:'放課後　教室の出口付近',summary:'Dさんが「結局さ、夜店いくん？」と聞くが、「結局」の前提が共有されておらず、Aさんには何の話か分からない場面。',point:'「結局」は過去の会話や迷っていた内容を相手も覚えている前提の言葉であり、その前提を共有しないと通じない。',note:'改善では、「何の件か」を先に説明してから確認することで、相手が同じ話題に乗れるようにする。',rows:[{head:'場面設定',visual:['放課後、Aさんは発表資料の確認をしながら帰る準備をしている。','Dさんは、以前話していた祭りの夜店の件を思い出す。','二人の頭の中にある話題が、この時点では一致していない。'],desc:'Aさんは発表資料の文脈にいる。一方、Dさんは以前の夜店の話題を思い出している。二人の関心が別々の場所にあることが前提になる。'},{head:'問題発生',visual:['Dさんが「結局さ、夜店いくん？」とだけ聞く。','Aさんは「結局」が何を指すのか分からない。','Dさんは説明せずに聞き返し、さらにすれ違いが大きくなる。'],desc:'ダメだった理由は、「結局」の裏にあるコンテキストを共有していないこと。Dさんにとっては続きの話でも、Aさんにとっては突然別の話が始まったように聞こえる。'},{head:'改善',visual:['Dさんは、まず発表の話を止めてもよいか短く確認する。','次に「この前話していた駅前の祭りの夜店」と、何の件かを説明する。','そのうえで、今日決めるかどうかを聞く。'],desc:'改善点は、「結局」を使う前に、話題の名前を出すこと。相手が同じ記憶をすぐ取り出せるようにすれば、過去の話題にも自然に戻れる。'},{head:'結末',visual:['Aさんは夜店の話だと理解する。','今は資料確認を優先し、その後で決める流れになる。','Dさんも、いつ確認すればよいか分かる。'],desc:'省略された言葉は、相手が同じ文脈を持っているときだけ通じる。前提が怪しいときは、遠回りに見えても一言説明した方が会話は早く進む。'}]}
];
function esc(v){return String(v).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function lines(arr){return arr.map(t=>`<p class="dialogue">${esc(t)}</p>`).join('');}
function row(r,i,s){const cls=i===3?' row4':'';const lead=i===0?`<div class="scene-name">${esc(s.stage)}</div><div class="place">${esc(s.place)}</div>`:'';return `<div class="cell visual${cls}">${lead}<div class="label">${esc(r.head)}</div>${lines(r.visual)}</div><div class="cell desc${cls}"><div class="label">${esc(r.head)}</div>${esc(r.desc)}</div>`;}
function page(s,i){return `<section class="page" id="stage-${i+1}"><div class="tpl-title">コミュニケーションスキル中間発表　絵コンテ</div><div class="team-line">チーム名（　　　　　　　）メンバー（　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　）</div><div class="format-line">当日の発表予定形式　　□動画　　□寸劇　　プレゼン　　□その他（　　　　　　　）</div><section class="storyboard"><div class="head left">絵・図等</div><div class="head">説明</div>${s.rows.map((r,idx)=>row(r,idx,s)).join('')}</section><div class="supplement-title">補足説明</div><div class="supplement-body"><strong>場面：</strong>${esc(s.summary)}<br><strong>コミュニケーション不全ポイント：</strong>${esc(s.point)}<br><strong>まとめ：</strong>${esc(s.note)}</div></section>`;}
document.getElementById('pages').innerHTML=storyboards.map(page).join('');
</script>
</body>
</html>
