<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コミュニケーション巻き戻し</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{height:100vh;overflow:hidden;background:#080912;color:#fff;font-family:'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;user-select:none}#game{width:100%;height:100vh;position:relative}.screen{position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column}.screen.active{display:flex}#title-screen{background:linear-gradient(135deg,#08091a,#1a0b2b 52%,#071829)}.stars{position:absolute;inset:0;overflow:hidden;pointer-events:none}.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--dur) infinite}@keyframes twinkle{0%,100%{opacity:.12}50%{opacity:.9}}.title-wrap{z-index:1;text-align:center;padding:20px}.title-badge{display:inline-block;margin-bottom:16px;padding:4px 14px;border:1px solid #6af;border-radius:999px;color:#6af;font-size:11px;letter-spacing:4px;text-transform:uppercase}.title-main{font-size:44px;font-weight:800;margin-bottom:8px;background:linear-gradient(135deg,#fff 30%,#adf);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}.title-sub{font-size:20px;color:#fa9;margin-bottom:34px}.title-card{max-width:760px;margin:0 auto 34px;padding:22px 28px;border:1px solid rgba(100,150,255,.22);border-radius:14px;background:rgba(255,255,255,.055);color:#c8c8d2;font-size:14px;line-height:1.9;text-align:left}.title-card strong{color:#fff}.tag-bad,.tag-good{display:inline-block;border-radius:4px;padding:1px 7px;font-size:12px}.tag-bad{background:rgba(255,90,90,.15);border:1px solid rgba(255,100,100,.4);color:#f99}.tag-good{background:rgba(100,255,120,.1);border:1px solid rgba(100,255,120,.35);color:#9f9}.start-btn,.res-btn,.replay-btn{font-family:inherit;cursor:pointer;transition:.2s}.start-btn{padding:16px 56px;border:2px solid #6af;border-radius:40px;background:linear-gradient(135deg,#1a3060,#102040);color:#fff;font-size:18px;font-weight:800}.start-btn:hover,.res-btn:hover,.replay-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(100,150,255,.22)}.scene-bg{position:absolute;inset:0;transition:background .7s}.hud{position:absolute;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:rgba(0,0,10,.62);border-bottom:1px solid rgba(255,255,255,.08)}.scene-label,.score-hud{font-size:13px;color:rgba(255,255,255,.62)}.score-hud span{color:#6f6;font-weight:800}.progress-dots{display:flex;gap:8px}.dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.22)}.dot.active{background:#6af;box-shadow:0 0 8px #6af}.dot.done{background:#6f6}.location-tag{position:absolute;top:58px;left:50%;z-index:10;transform:translateX(-50%);padding:6px 18px;border:1px solid rgba(100,150,255,.32);border-radius:999px;background:rgba(0,0,30,.85);color:#adf;font-size:13px;white-space:nowrap}.char-area{position:absolute;bottom:195px;width:100%;display:flex;justify-content:space-around;align-items:flex-end;padding:0 8%}.char-box{text-align:center;transition:.25s}.char-emoji{display:block;font-size:90px;transition:.25s}.char-name{margin-top:4px;color:#999;font-size:12px}.char-box.speaking .char-emoji{transform:scale(1.12);filter:drop-shadow(0 0 20px rgba(255,255,255,.4))}.char-box.dim .char-emoji{filter:brightness(.3) saturate(.35)}.dialogue-box{position:absolute;left:0;right:0;bottom:0;height:188px;display:flex;flex-direction:column;padding:16px 28px 14px;border-top:2px solid rgba(100,150,255,.35);background:rgba(0,0,18,.94);cursor:pointer}.spk-name{display:inline-block;margin-bottom:8px;padding:3px 12px;border-left:3px solid #6af;background:rgba(100,150,255,.12);color:#6af;font-size:15px;font-weight:800}.spk-name.internal{border-color:#fa9;background:rgba(255,160,80,.1);color:#fa9;font-style:italic}.dlg-text{flex:1;color:#e8e8e8;font-size:17px;line-height:1.75;white-space:pre-wrap}.dlg-text.internal{color:#fa9;font-style:italic}.click-hint{position:absolute;right:18px;bottom:12px;color:rgba(255,255,255,.35);font-size:11px;animation:blink 1.2s infinite}@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}.choice-overlay{position:absolute;left:0;right:0;bottom:0;padding:18px 24px;border-top:2px solid rgba(100,150,255,.35);background:rgba(0,0,18,.97)}.choice-q{text-align:center;margin-bottom:14px;color:#adf;font-size:16px;font-weight:800}.choice-btns{display:flex;gap:14px}.choice-btn{flex:1;padding:14px 16px;border:2px solid;border-radius:10px;background:transparent;color:#fff;font-family:inherit;text-align:left;line-height:1.5;cursor:pointer;transition:.2s}.choice-btn.bad{border-color:rgba(255,100,100,.65)}.choice-btn.good{border-color:rgba(100,255,100,.65)}.choice-btn:hover{transform:translateY(-2px)}.choice-btn.bad:hover{background:rgba(255,80,80,.15);border-color:#f66}.choice-btn.good:hover{background:rgba(80,255,80,.12);border-color:#6f6}.btn-label{font-size:16px;font-weight:800;margin-bottom:4px}.btn-sub{font-size:12px;opacity:.68}.bad .btn-label{color:#f99}.good .btn-label{color:#9f9}.result-panel{position:absolute;top:50%;left:50%;z-index:20;transform:translate(-50%,-50%);width:92%;max-width:620px;padding:32px 36px;border:2px solid;border-radius:14px;background:rgba(0,0,18,.98);text-align:center}.result-panel.bad{border-color:#f66}.result-panel.good{border-color:#6f6}.res-icon{font-size:56px;margin-bottom:12px}.res-title{font-size:22px;font-weight:800;margin-bottom:12px}.bad .res-title{color:#f66}.good .res-title{color:#6f6}.res-text{margin-bottom:16px;color:#ccc;font-size:14px;line-height:1.8;white-space:pre-wrap}.res-tip{margin-bottom:18px;padding:12px 16px;border:1px solid rgba(100,220,100,.25);border-radius:8px;background:rgba(100,220,100,.07);color:#9f9;font-size:13px;line-height:1.7;text-align:left}.res-btn,.replay-btn{padding:12px 32px;border:2px solid #6af;border-radius:999px;background:transparent;color:#6af;font-size:15px;font-weight:800}#end-screen{background:linear-gradient(135deg,#080f08,#0a160a 50%,#0f1a0a)}.end-wrap{z-index:1;width:95%;max-width:760px;padding:20px;text-align:center}.end-title{font-size:34px;font-weight:800}.end-score{margin:16px 0;font-size:52px;font-weight:800}.tips-box{margin:16px 0;padding:20px 24px;border:1px solid rgba(255,255,255,.1);border-radius:12px;background:rgba(255,255,255,.04);text-align:left}.tips-heading{font-weight:800;margin-bottom:14px}.tip-row{display:flex;gap:12px;margin-bottom:13px}.tip-num{width:22px;height:22px;border-radius:50%;background:#6af;color:#000;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0}.tip-body{color:#bbb;font-size:13px;line-height:1.65}.tip-body strong{color:#adf}.end-msg{margin:14px 0;color:#9f9;font-size:15px;line-height:1.8}#fade{position:fixed;inset:0;z-index:100;background:#000;opacity:0;pointer-events:none;transition:opacity .4s}
</style>
</head>
<body>
<div id="game">
<div id="fade"></div>

<div class="screen active" id="title-screen">
  <div class="stars" id="stars"></div>
  <div class="title-wrap">
    <div class="title-badge">Communication Rewind Game</div>
    <div class="title-main">コミュニケーション巻き戻し</div>
    <div class="title-sub">〜 4つの失敗をやり直せ 〜</div>
    <div class="title-card">
      <strong>コミュニケーションの授業発表</strong>を準備する中で、4種類の失敗が起きます。<br><br>
      1つ目は<span class="tag-bad">文脈無視の乱入</span>、2つ目は<span class="tag-bad">曖昧な作業依頼</span>、3つ目は<span class="tag-bad">発表中の助け方ミス</span>、4つ目は<span class="tag-bad">前提共有なしの「結局」</span>です。<br><br>
      まずアカン例を見て、失敗ポップアップ後に<span class="tag-good">会話が続く選択</span>をしてください。
    </div>
    <button class="start-btn" onclick="startGame()">▶ アカン例を見る</button>
  </div>
</div>

<div class="screen" id="scene-screen">
  <div class="scene-bg" id="scene-bg"></div>
  <div class="hud"><div class="scene-label" id="scene-label"></div><div class="progress-dots" id="progress-dots"></div><div class="score-hud">修復数 <span id="score-val">0</span> / 4</div></div>
  <div class="location-tag" id="location-tag"></div>
  <div class="char-area" id="char-area"></div>
  <div class="dialogue-box" id="dlg-box" onclick="handleClick()"><div class="spk-name" id="spk-name"></div><div class="dlg-text" id="dlg-text"></div><div class="click-hint">クリックして続ける ▼</div></div>
  <div class="choice-overlay" id="choice-overlay" style="display:none"><div class="choice-q" id="choice-q"></div><div class="choice-btns" id="choice-btns"></div></div>
  <div class="result-panel" id="result-panel" style="display:none"><div class="res-icon" id="res-icon"></div><div class="res-title" id="res-title"></div><div class="res-text" id="res-text"></div><div class="res-tip" id="res-tip" style="display:none"></div><button class="res-btn" id="res-btn"></button></div>
</div>

<div class="screen" id="end-screen">
  <div class="end-wrap"><div class="end-title">🎊 修復完了！</div><div class="end-score" id="end-score"></div><div class="tips-box" id="tips-box"></div><div class="end-msg">4つの違う失敗を、それぞれ別の方法で修復できました。</div><button class="replay-btn" onclick="restartGame()">もう一度プレイする</button></div>
</div>
</div>

<script>
const SCENES = [
  {
    title: 'ステージ1：文脈無視の乱入',
    location: '📍 教室　発表テーマ相談中',
    bg: 'linear-gradient(180deg,#071830 0%,#050d20 65%,#030810 100%)',
    chars: { L: { emoji:'🧑‍🤝‍🧑', name:'Aさん・Bさん' }, R: { emoji:'🚶', name:'Cさん' } },
    dialogues: [
      { spk:'Aさん', side:'L', text:'次の発表、コミュニケーション不全の例を寸劇にするってどう？' },
      { spk:'Bさん', side:'L', text:'いいね。相手の話題を無視して、急に別の話をする例が分かりやすそう。' },
      { spk:'Cさん', side:'R', text:'あんたって妹と最近どうなん' },
      { spk:'Aさん', side:'L', text:'？' },
      { spk:'Bさん', side:'L', text:'？' },
      { spk:'Cさん', side:'R', text:'🛬🕋' }
    ],
    failText: '失敗した！会話に入る直前からやり直せ。',
    choiceQ: '⚡ やり直し：Cさんはどう入る？',
    choices: [
      { type:'bad', label:'「妹と最近どうなん」', sub:'文脈確認なしで乱入する', after:[{ spk:'Cさん', side:'R', text:'妹と最近どうなん' },{ spk:'Aさん', side:'L', text:'いや、今その話してないけど……' }], rewind:'失敗した！また話題を壊した。やり直せ。' },
      { type:'good', label:'「今の話、入ってもいい？」', sub:'話題確認と参加許可をする', after:[{ spk:'Cさん', side:'R', text:'今、授業の発表について話してた？ 途中から聞こえたんだけど、入ってもいい？' },{ spk:'Aさん', side:'L', text:'うん、コミュニケーション不全の例を考えてた。' },{ spk:'Bさん', side:'L', text:'入って大丈夫。何か案ある？' }], tip:'💡 修復：途中参加では、まず話題確認と参加許可をする。乱入ではなく参加になる。' }
    ]
  },
  {
    title: 'ステージ2：曖昧な作業依頼',
    location: '📍 図書館　発表資料づくり',
    bg: 'linear-gradient(180deg,#092417 0%,#06140c 65%,#020805 100%)',
    chars: { L: { emoji:'🧑', name:'Aさん' }, R: { emoji:'👩', name:'Bさん' } },
    dialogues: [
      { spk:'Aさん', side:'L', text:'俺、用事あるから先に帰るわ。資料、いい感じにしといて。' },
      { spk:'Bさん', side:'R', text:'いい感じって、どこまで？' },
      { spk:'Aさん', side:'L', text:'そこは任せる。発表で困らない感じ。' },
      { spk:'Bさん', side:'R', text:'えっと……じゃあデザインだけ整えておくね。' },
      { spk:'Aさん', side:'L', text:'翌日：なんで内容が増えてないの？ 発表で困るじゃん。' },
      { spk:'Bさん', side:'R', text:'それをやるって聞いてないよ……' }
    ],
    failText: '失敗した！作業を頼む直前からやり直せ。',
    choiceQ: '⚡ やり直し：Aさんはどう頼む？',
    choices: [
      { type:'bad', label:'「発表で困らない感じで」', sub:'完成条件を曖昧にしたまま頼む', after:[{ spk:'Aさん', side:'L', text:'発表で困らない感じでお願い。' },{ spk:'Bさん', side:'R', text:'だから、その困らない感じが分からない……' }], rewind:'失敗した！曖昧なまま押し付けた。やり直せ。' },
      { type:'good', label:'「担当・期限・完成条件」を言う', sub:'何をどこまでやるか明確にする', after:[{ spk:'Aさん', side:'L', text:'ごめん、先に帰るから、Bさんはスライド3〜5枚目の文章を短くして、今日20時までに共有してくれる？ 画像探しは俺が帰ってからやる。' },{ spk:'Bさん', side:'R', text:'それなら分かる。文章の整理だけ今日20時までね。' },{ spk:'Aさん', side:'L', text:'ありがとう。終わったらチャットに送って。確認する。' }], tip:'💡 修復：依頼では「担当・期限・完成条件」を言う。いい感じ、任せる、適当に、はズレやすい。' }
    ]
  },
  {
    title: 'ステージ3：発表中の助け方ミス',
    location: '📍 発表本番　前に出て発表中',
    bg: 'linear-gradient(180deg,#20102a 0%,#120817 65%,#07030a 100%)',
    chars: { L: { emoji:'👩‍🏫', name:'Bさん' }, R: { emoji:'🧑', name:'Aさん' } },
    dialogues: [
      { spk:'Bさん', side:'L', text:'えっと、この場面では……相手の……えー……' },
      { spk:'Aさん', side:'R', text:'そこ違う。もういい、俺が説明する。' },
      { spk:'Bさん', side:'L', text:'え……' },
      { spk:'Aさん', side:'R', text:'これは文脈を確認しないと会話が止まる、という話です。' },
      { spk:'Bさん', side:'L', text:'……' },
      { spk:'観客', side:'R', text:'助けたというより、発表を奪った感じになってる……' }
    ],
    failText: '失敗した！Bさんが詰まった場面からやり直せ。',
    choiceQ: '⚡ やり直し：Aさんはどう助ける？',
    choices: [
      { type:'bad', label:'「もういい、俺が説明する」', sub:'相手を否定して発表を奪う', after:[{ spk:'Aさん', side:'R', text:'もういい、俺が説明する。' },{ spk:'Bさん', side:'L', text:'……' }], rewind:'失敗した！相手を助けずに発表を奪った。やり直せ。' },
      { type:'good', label:'「補足すると〜です」', sub:'相手の発表を残したまま助ける', after:[{ spk:'Aさん', side:'R', text:'補足すると、この場面では「相手の話題を確認せずに入る」と会話が止まりやすい、という例です。' },{ spk:'Bさん', side:'L', text:'そうです。なので、改善後は最初に「今の話に入ってもいい？」と確認します。' },{ spk:'Aさん', side:'R', text:'Bさんの説明に付け加えると、相手の立場を残したまま話すことも大事です。' }], tip:'💡 修復：相手が詰まったときは、否定して奪うのではなく「補足」として助ける。相手の発表者としての立場を残す。' }
    ]
  },
  {
    title: 'ステージ4：前提共有なしの「結局」',
    location: '📍 放課後　教室の出口付近',
    bg: 'linear-gradient(180deg,#2a1b08 0%,#140d05 65%,#080402 100%)',
    chars: { L: { emoji:'🧑', name:'Aさん' }, R: { emoji:'🎒', name:'Dさん' } },
    dialogues: [
      { spk:'Aさん', side:'L', text:'今日の発表、資料の順番だけ帰る前に確認しよう。' },
      { spk:'Dさん', side:'R', text:'結局さ、夜店いくん？' },
      { spk:'Aさん', side:'L', text:'え、夜店？' },
      { spk:'Dさん', side:'R', text:'だから、結局どうするんって話。' },
      { spk:'Aさん', side:'L', text:'ごめん、何の話か分からない。今は発表資料の話をしてた。' }
    ],
    failText: '失敗した！「結局」の前提を共有する直前からやり直せ。',
    choiceQ: '⚡ やり直し：Dさんはどう聞く？',
    choices: [
      { type:'bad', label:'「結局さ、夜店いくん？」', sub:'前提を言わずに聞く', after:[{ spk:'Dさん', side:'R', text:'結局さ、夜店いくん？' },{ spk:'Aさん', side:'L', text:'結局って、何の話？' }], rewind:'失敗した！「結局」の前提が共有されていない。やり直せ。' },
      { type:'good', label:'「この前話してた夜店の件だけど…」', sub:'先に何の話か共有する', after:[{ spk:'Dさん', side:'R', text:'ごめん、発表の話の途中で一つだけ確認していい？ この前話してた、駅前の祭りの夜店に行くかどうかの件なんだけど、今日決める？' },{ spk:'Aさん', side:'L', text:'ああ、その話ね。発表資料を確認したあとで決めよう。' },{ spk:'Dさん', side:'R', text:'了解。じゃあ資料の確認が終わったらまた聞く。' }], tip:'💡 修復：「結局」は、過去の話題を相手も覚えている前提の言葉。先に「何の件か」を言うと通じやすい。' }
    ]
  }
];

let sceneIdx=0,dlgIdx=0,score=0,phase='dlg',chosen=null,afterIdx=0,typing=false,typeTimer=null,fullTxt='';
function initStars(){const c=document.getElementById('stars');c.innerHTML='';for(let i=0;i<120;i++){const s=document.createElement('div');s.className='star';const z=Math.random()*2.5+.5;s.style.cssText=`width:${z}px;height:${z}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${(Math.random()*3+2).toFixed(1)}s`;c.appendChild(s)}}
function fade(to,cb){const el=document.getElementById('fade');el.style.opacity=to;el.style.pointerEvents=to>0?'all':'none';if(cb)setTimeout(cb,420)}
function showScreen(id){fade(.6,()=>{document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');fade(0,null)})}
function startGame(){sceneIdx=0;score=0;showScreen('scene-screen');setTimeout(loadScene,450)}
function restartGame(){sceneIdx=0;score=0;showScreen('scene-screen');setTimeout(loadScene,450)}
function loadScene(){const s=SCENES[sceneIdx];dlgIdx=0;phase='dlg';chosen=null;afterIdx=0;document.getElementById('scene-bg').style.background=s.bg;document.getElementById('scene-label').textContent=s.title;document.getElementById('location-tag').textContent=s.location;updateDots();updateScore();document.getElementById('choice-overlay').style.display='none';document.getElementById('result-panel').style.display='none';document.getElementById('dlg-box').style.display='flex';renderChars(null);showDlg(s.dialogues[0])}
function updateDots(){const el=document.getElementById('progress-dots');el.innerHTML='';SCENES.forEach((_,i)=>{const d=document.createElement('div');d.className='dot'+(i<sceneIdx?' done':i===sceneIdx?' active':'');el.appendChild(d)})}
function updateScore(){document.getElementById('score-val').textContent=score}
function renderChars(speakSide){const s=SCENES[sceneIdx],area=document.getElementById('char-area');area.innerHTML='';['L','R'].forEach(side=>{const ch=s.chars[side],box=document.createElement('div');box.className='char-box'+(speakSide===side?' speaking':speakSide!==null?' dim':'');box.innerHTML=`<span class="char-emoji">${ch.emoji}</span><div class="char-name">${ch.name}</div>`;area.appendChild(box)})}
function typewrite(el,txt,done){typing=true;fullTxt=txt;el.textContent='';let i=0;function step(){if(i<txt.length){el.textContent+=txt[i++];typeTimer=setTimeout(step,28)}else{typing=false;if(done)done()}}step()}
function skipType(){if(typeTimer)clearTimeout(typeTimer);typing=false;document.getElementById('dlg-text').textContent=fullTxt}
function showDlg(d){const n=document.getElementById('spk-name'),t=document.getElementById('dlg-text');n.textContent=d.spk;n.className='spk-name'+(d.internal?' internal':'');t.className='dlg-text'+(d.internal?' internal':'');renderChars(d.side||null);typewrite(t,d.text,null)}
function handleClick(){if(typing){skipType();return}advancePhase()}
function advancePhase(){const s=SCENES[sceneIdx];if(phase==='dlg'){dlgIdx++;if(dlgIdx<s.dialogues.length)showDlg(s.dialogues[dlgIdx]);else showFailPopupBeforeChoice()}else if(phase==='after'){afterIdx++;const arr=chosen.after;if(afterIdx<arr.length)showDlg(arr[afterIdx]);else showResult()}}
function showFailPopupBeforeChoice(){document.getElementById('dlg-box').style.display='none';renderChars(null);const p=document.getElementById('result-panel');p.className='result-panel bad';document.getElementById('res-icon').textContent='❌';document.getElementById('res-title').textContent='失敗した！やり直せ';document.getElementById('res-text').textContent=SCENES[sceneIdx].failText;document.getElementById('res-tip').style.display='none';const b=document.getElementById('res-btn');b.textContent='やり直す';b.onclick=showChoices;p.style.display='block';phase='preChoice'}
function showChoices(){const s=SCENES[sceneIdx];document.getElementById('result-panel').style.display='none';document.getElementById('dlg-box').style.display='none';renderChars(null);document.getElementById('choice-q').textContent=s.choiceQ;const btns=document.getElementById('choice-btns');btns.innerHTML='';s.choices.forEach((c,i)=>{const b=document.createElement('button');b.className=`choice-btn ${c.type}`;b.innerHTML=`<div class="btn-label">${c.label}</div><div class="btn-sub">${c.sub}</div>`;b.onclick=()=>selectChoice(i);btns.appendChild(b)});document.getElementById('choice-overlay').style.display='block';phase='choice'}
function selectChoice(idx){chosen=SCENES[sceneIdx].choices[idx];document.getElementById('choice-overlay').style.display='none';document.getElementById('dlg-box').style.display='flex';phase='after';afterIdx=0;showDlg(chosen.after[0])}
function showResult(){document.getElementById('dlg-box').style.display='none';const p=document.getElementById('result-panel'),icon=document.getElementById('res-icon'),title=document.getElementById('res-title'),text=document.getElementById('res-text'),tip=document.getElementById('res-tip'),btn=document.getElementById('res-btn');if(chosen.type==='bad'){p.className='result-panel bad';icon.textContent='❌';title.textContent='失敗した！やり直せ';text.textContent=chosen.rewind||'失敗した！やり直せ。';tip.style.display='none';btn.textContent='やり直す';btn.onclick=showChoices}else{score++;updateScore();p.className='result-panel good';icon.textContent='✅';title.textContent='いい感じ！';text.textContent='会話が止まらず、次の場面へ進めるようになりました。';tip.style.display='block';tip.textContent=chosen.tip;if(sceneIdx<SCENES.length-1){btn.textContent='次へ →';btn.onclick=nextScene}else{btn.textContent='ゲームクリア！ 🎊';btn.onclick=showEnd}}p.style.display='block';phase='result'}
function nextScene(){document.getElementById('result-panel').style.display='none';sceneIdx++;loadScene()}
function showEnd(){showScreen('end-screen');setTimeout(()=>{const sc=document.getElementById('end-score');sc.innerHTML=`⭐ ${score} / 4 ⭐<br><span style="font-size:18px;color:#ff9">全場面修復！</span>`;sc.style.color='#ffd';const box=document.getElementById('tips-box');box.innerHTML='<div class="tips-heading">📋 修復した内容</div>';SCENES.forEach((s,i)=>{const good=s.choices.find(c=>c.type==='good'),row=document.createElement('div');row.className='tip-row';row.innerHTML=`<div class="tip-num">${i+1}</div><div class="tip-body"><strong>${s.title}</strong><br>${good.tip.replace('💡 修復：','')}</div>`;box.appendChild(row)})},500)}
initStars();
</script>
</body>
</html>
