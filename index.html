<!DOCTYPE html>
<html lang="ja">
<head>

<title>コミュニケーション巻き戻し</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{height:100vh;overflow:hidden;background:#080912;color:#fff;font-family:'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;user-select:none}body::before{content:'';position:fixed;inset:-25%;z-index:-2;background:radial-gradient(circle at 18% 15%,rgba(80,140,255,.24),transparent 24%),radial-gradient(circle at 82% 12%,rgba(255,80,210,.18),transparent 26%),radial-gradient(circle at 70% 82%,rgba(90,255,170,.14),transparent 28%),#080912;animation:bgDrift 18s linear infinite}@keyframes bgDrift{0%,100%{transform:rotate(0) scale(1)}50%{transform:rotate(3deg) scale(1.04)}}#game{width:100%;height:100vh;position:relative}.screen{position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column}.screen.active{display:flex}#title-screen{background:linear-gradient(135deg,rgba(8,9,26,.96),rgba(26,11,43,.92) 52%,rgba(7,24,41,.96))}.stars{position:absolute;inset:0;overflow:hidden;pointer-events:none}.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--dur) infinite}@keyframes twinkle{0%,100%{opacity:.12;transform:scale(.75)}50%{opacity:.9;transform:scale(1.2)}}.title-wrap{z-index:1;text-align:center;padding:20px;animation:floatSoft 4.5s ease-in-out infinite}.title-badge{display:inline-block;margin-bottom:16px;padding:4px 14px;border:1px solid #6af;border-radius:999px;color:#6af;font-size:11px;letter-spacing:4px;text-transform:uppercase;box-shadow:0 0 18px rgba(80,160,255,.24)}.title-main{font-size:44px;font-weight:1000;margin-bottom:8px;background:linear-gradient(90deg,#fff,#adf,#fffd9b,#ffa7ee,#fff);background-size:300% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:titleRainbow 3.2s linear infinite}.title-sub{font-size:20px;color:#fa9;margin-bottom:34px;text-shadow:0 0 12px rgba(255,170,120,.4)}.title-card{max-width:760px;margin:0 auto 34px;padding:22px 28px;border:1px solid rgba(100,150,255,.22);border-radius:14px;background:rgba(255,255,255,.055);color:#c8c8d2;font-size:14px;line-height:1.9;text-align:left;box-shadow:0 18px 80px rgba(0,0,0,.25),inset 0 0 28px rgba(100,150,255,.05)}.title-card strong{color:#fff}.tag-bad,.tag-good{display:inline-block;border-radius:4px;padding:1px 7px;font-size:12px}.tag-bad{background:rgba(255,90,90,.15);border:1px solid rgba(255,100,100,.4);color:#f99}.tag-good{background:rgba(100,255,120,.1);border:1px solid rgba(100,255,120,.35);color:#9f9}.start-btn,.res-btn,.replay-btn{font-family:inherit;cursor:pointer;transition:.2s}.start-btn{position:relative;overflow:hidden;padding:16px 56px;border:2px solid #6af;border-radius:40px;background:linear-gradient(135deg,#1a3060,#102040);color:#fff;font-size:18px;font-weight:1000;animation:buttonBreath 1.7s ease-in-out infinite}.start-btn::after,.res-btn::after,.replay-btn::after{content:'';position:absolute;inset:-60% -35%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.45),transparent);transform:translateX(-70%) rotate(18deg);animation:shine 2.2s linear infinite}.start-btn:hover,.res-btn:hover,.replay-btn:hover{transform:translateY(-2px) scale(1.04);box-shadow:0 12px 36px rgba(100,150,255,.38)}@keyframes titleRainbow{to{background-position:300% 0}}@keyframes shine{0%{transform:translateX(-90%) rotate(18deg)}55%,100%{transform:translateX(95%) rotate(18deg)}}@keyframes floatSoft{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}@keyframes buttonBreath{0%,100%{box-shadow:0 0 0 rgba(100,170,255,0)}50%{box-shadow:0 0 25px rgba(100,170,255,.35)}}.scene-bg{position:absolute;inset:0;transition:background .7s}.scene-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(120deg,transparent,rgba(255,255,255,.055),transparent);background-size:220% 100%;animation:bgSweep 6s linear infinite}.hud{position:absolute;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:rgba(0,0,10,.62);border-bottom:1px solid rgba(255,255,255,.08);box-shadow:0 6px 30px rgba(0,0,0,.3)}.scene-label,.score-hud{font-size:13px;color:rgba(255,255,255,.62);white-space:nowrap}.scene-label{max-width:42vw;overflow:hidden;text-overflow:ellipsis}.score-hud span{display:inline-block;color:#6f6;font-weight:1000}.score-hud span.bump{animation:scoreBump .42s cubic-bezier(.15,1.25,.3,1)}.progress-dots{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:flex;gap:14px;align-items:center;justify-content:center;padding:6px 12px;border-radius:999px;background:rgba(0,0,20,.28);box-shadow:inset 0 0 18px rgba(255,255,255,.04)}.dot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,.24);transition:.25s}.dot.active{background:#6af;box-shadow:0 0 10px #6af,0 0 26px rgba(100,170,255,.58);animation:dotPulse 1s ease-in-out infinite}.dot.done{background:#6f6;box-shadow:0 0 12px #6f6;animation:dotDone .55s cubic-bezier(.2,1.35,.2,1)}.location-tag{position:absolute;top:58px;left:50%;z-index:10;transform:translateX(-50%);padding:6px 18px;border:1px solid rgba(100,150,255,.32);border-radius:999px;background:rgba(0,0,30,.85);color:#adf;font-size:13px;white-space:nowrap;box-shadow:0 0 18px rgba(100,150,255,.16)}.char-area{position:absolute;bottom:195px;width:100%;display:flex;justify-content:space-around;align-items:flex-end;padding:0 8%}.char-box{text-align:center;transition:.25s}.char-emoji{display:block;font-size:90px;transition:.25s}.char-name{margin-top:4px;color:#999;font-size:12px}.char-box.speaking .char-emoji{transform:scale(1.08);filter:drop-shadow(0 0 18px rgba(255,255,255,.32))}.char-box.dim .char-emoji{filter:brightness(.32) saturate(.38)}.stage-enter .char-box{animation:charEnter .42s cubic-bezier(.16,1.05,.28,1) both}.stage-enter .char-box:nth-child(2){animation-delay:.08s}.dialogue-box{position:absolute;left:0;right:0;bottom:0;height:188px;display:flex;flex-direction:column;padding:16px 28px 14px;border-top:2px solid rgba(100,150,255,.35);background:rgba(0,0,18,.94);cursor:pointer;box-shadow:0 -10px 42px rgba(80,150,255,.08)}.spk-name{display:inline-block;margin-bottom:8px;padding:3px 12px;border-left:3px solid #6af;background:rgba(100,150,255,.12);color:#6af;font-size:15px;font-weight:1000}.spk-name.internal{border-color:#fa9;background:rgba(255,160,80,.1);color:#fa9;font-style:italic}.dlg-text{flex:1;color:#e8e8e8;font-size:17px;line-height:1.75;white-space:pre-wrap}.dlg-text.internal{color:#fa9;font-style:italic}.click-hint{position:absolute;right:18px;bottom:12px;color:rgba(255,255,255,.45);font-size:11px;animation:hintBounce 1.1s infinite}.choice-overlay{position:absolute;left:0;right:0;bottom:0;padding:18px 24px;border-top:2px solid rgba(100,150,255,.35);background:rgba(0,0,18,.97);animation:choiceIn .32s cubic-bezier(.16,1.1,.3,1)}.choice-q{text-align:center;margin-bottom:14px;color:#adf;font-size:16px;font-weight:1000;text-shadow:0 0 16px rgba(120,190,255,.45)}.choice-btns{display:flex;gap:14px}.choice-btn{position:relative;overflow:hidden;flex:1;padding:14px 16px;border:2px solid;border-radius:10px;background:transparent;color:#fff;font-family:inherit;text-align:left;line-height:1.5;cursor:pointer;transition:.18s}.choice-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(120deg,transparent,rgba(255,255,255,.08),transparent);transform:translateX(-100%);animation:choiceShine 2.4s linear infinite}.choice-btn.bad{border-color:rgba(255,100,100,.65)}.choice-btn.good{border-color:rgba(100,255,100,.65);box-shadow:0 0 18px rgba(100,255,100,.1)}.choice-btn:hover{transform:translateY(-3px) scale(1.025)}.choice-btn.bad:hover{background:rgba(255,80,80,.15);border-color:#f66}.choice-btn.good:hover{background:rgba(80,255,80,.12);border-color:#6f6;box-shadow:0 0 30px rgba(100,255,100,.22)}.btn-label{position:relative;font-size:16px;font-weight:1000;margin-bottom:4px}.btn-sub{position:relative;font-size:12px;opacity:.72}.bad .btn-label{color:#f99}.good .btn-label{color:#9f9}.result-panel{position:absolute;top:50%;left:50%;z-index:20;transform:translate(-50%,-50%);width:92%;max-width:620px;padding:32px 36px;border:2px solid;border-radius:14px;background:rgba(0,0,18,.98);text-align:center;animation:panelPop .28s cubic-bezier(.16,1.2,.28,1)}.result-panel.bad{border-color:#f66}.result-panel.good{border-color:#ffd34f;box-shadow:0 0 46px rgba(255,211,79,.28),inset 0 0 20px rgba(255,211,79,.08)}.res-icon{font-size:56px;margin-bottom:12px;animation:iconSpin .65s cubic-bezier(.2,1.25,.2,1)}.res-title{font-size:22px;font-weight:1000;margin-bottom:12px}.bad .res-title{color:#f66}.good .res-title{color:#ffd34f;text-shadow:0 0 16px rgba(255,211,79,.6)}.res-text{margin-bottom:16px;color:#ccc;font-size:14px;line-height:1.8;white-space:pre-wrap}.res-tip{margin-bottom:18px;padding:12px 16px;border:1px solid rgba(255,211,79,.32);border-radius:8px;background:rgba(255,211,79,.08);color:#fff2a6;font-size:13px;line-height:1.7;text-align:left}.res-btn,.replay-btn{position:relative;overflow:hidden;padding:12px 32px;border:2px solid #6af;border-radius:999px;background:transparent;color:#6af;font-size:15px;font-weight:1000}#end-screen{background:linear-gradient(135deg,#080f08,#0a160a 50%,#0f1a0a)}.end-wrap{z-index:1;width:95%;max-width:760px;padding:20px;text-align:center}.end-title{font-size:34px;font-weight:1000;background:linear-gradient(90deg,#fff,#9f9,#fffd9b,#ffa7ee,#fff);background-size:300% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:titleRainbow 2s linear infinite}.end-score{margin:16px 0;font-size:52px;font-weight:1000}.tips-box{margin:16px 0;padding:20px 24px;border:1px solid rgba(255,255,255,.1);border-radius:12px;background:rgba(255,255,255,.04);text-align:left}.tips-heading{font-weight:1000;margin-bottom:14px}.tip-row{display:flex;gap:12px;margin-bottom:13px;animation:tipSlide .45s ease both}.tip-num{width:22px;height:22px;border-radius:50%;background:#6af;color:#000;display:flex;align-items:center;justify-content:center;font-weight:1000;font-size:12px;flex-shrink:0}.tip-body{color:#bbb;font-size:13px;line-height:1.65}.tip-body strong{color:#adf}.end-msg{margin:14px 0;color:#9f9;font-size:15px;line-height:1.8}#fade{position:fixed;inset:0;z-index:100;background:#000;opacity:0;pointer-events:none;transition:opacity .4s}#fx-layer{position:fixed;inset:0;z-index:80;pointer-events:none;overflow:hidden}.fx-particle{position:absolute;left:var(--x);top:var(--y);font-size:var(--s);filter:drop-shadow(0 0 8px rgba(255,255,255,.75));animation:fxPop var(--time) cubic-bezier(.12,.8,.18,1) forwards}.fx-flash{position:absolute;inset:0;animation:flashGood .42s ease-out forwards;background:radial-gradient(circle,#fff 0%,rgba(255,255,255,.32) 22%,rgba(255,255,255,0) 70%)}.fx-flash.fail{animation:flashBad .34s ease-out forwards;background:radial-gradient(circle,rgba(255,60,60,.72) 0%,rgba(255,60,60,.18) 30%,rgba(255,60,60,0) 75%)}#combo-pop{position:fixed;top:92px;left:50%;z-index:90;transform:translateX(-50%) scale(.4);opacity:0;pointer-events:none;padding:10px 22px;border:2px solid rgba(255,255,255,.85);border-radius:999px;background:linear-gradient(135deg,rgba(255,214,74,.95),rgba(255,90,90,.94),rgba(255,245,120,.95));color:#1b0800;font-size:34px;font-weight:1000;letter-spacing:.04em;text-shadow:0 1px 0 rgba(255,255,255,.7)}#combo-pop.show{animation:comboPop .9s cubic-bezier(.1,1.15,.2,1) forwards}.pachi{position:fixed;left:50%;top:22%;z-index:95;transform:translate(-50%,-50%) scale(.4);opacity:0;pointer-events:none;text-align:center}.pachi.show{animation:pachiShow 1.15s cubic-bezier(.12,1.2,.18,1) forwards}.pachi .label{display:inline-block;padding:8px 22px;border:3px solid #ffd34f;border-radius:999px;background:linear-gradient(180deg,#fff7a8,#ff3333 45%,#7b0000);color:#fff;font-size:30px;font-weight:1000;letter-spacing:.1em;text-shadow:0 3px 0 #530,0 0 18px #ffd34f;box-shadow:0 0 24px #ffd34f,0 0 60px rgba(255,40,40,.55)}.reels{display:flex;justify-content:center;gap:8px;margin-top:10px}.reel{width:58px;height:58px;border:3px solid #ffd34f;border-radius:12px;background:#fff;color:#d60000;font-size:40px;font-weight:1000;line-height:52px;box-shadow:inset 0 -8px 0 rgba(0,0,0,.15),0 0 18px rgba(255,211,79,.6);animation:reelStop .42s ease both}.reel:nth-child(2){animation-delay:.12s}.reel:nth-child(3){animation-delay:.24s}.juice{animation:juice .32s ease-in-out}.mega-clear{animation:megaClear 1.25s ease-out}.ambient-orb{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.75),rgba(120,190,255,.15),transparent 65%);animation:orbFloat var(--t) linear forwards;filter:blur(.2px)}@keyframes bgSweep{to{background-position:220% 0}}@keyframes dotPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.28)}}@keyframes dotDone{0%{transform:scale(.4)}70%{transform:scale(1.45)}100%{transform:scale(1)}}@keyframes scoreBump{0%{transform:scale(1)}50%{transform:scale(1.8) rotate(-7deg);color:#fffd9b;text-shadow:0 0 16px #fffd9b}100%{transform:scale(1)}}@keyframes hintBounce{0%,100%{opacity:.35;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}@keyframes choiceIn{0%{transform:translateY(30px);opacity:0}100%{transform:translateY(0);opacity:1}}@keyframes choiceShine{0%{transform:translateX(-100%)}55%,100%{transform:translateX(100%)}}@keyframes panelPop{0%{opacity:0;transform:translate(-50%,-44%) scale(.85)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}@keyframes iconSpin{0%{transform:scale(.4) rotate(-30deg)}70%{transform:scale(1.18) rotate(8deg)}100%{transform:scale(1) rotate(0)}}@keyframes tipSlide{0%{opacity:0;transform:translateX(-16px)}100%{opacity:1;transform:translateX(0)}}@keyframes fxPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.2) rotate(0deg)}12%{opacity:1}100%{opacity:0;transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(1.35) rotate(var(--rot))}}@keyframes flashGood{0%{opacity:0}25%{opacity:1}100%{opacity:0}}@keyframes flashBad{0%{opacity:0}25%{opacity:.85}100%{opacity:0}}@keyframes comboPop{0%{opacity:0;transform:translateX(-50%) translateY(20px) scale(.35) rotate(-8deg)}18%{opacity:1;transform:translateX(-50%) translateY(0) scale(1.18) rotate(2deg)}55%{opacity:1;transform:translateX(-50%) scale(1) rotate(0)}100%{opacity:0;transform:translateX(-50%) translateY(-30px) scale(.9)}}@keyframes juice{0%,100%{transform:translate(0,0)}20%{transform:translate(-6px,3px)}40%{transform:translate(6px,-3px)}60%{transform:translate(-4px,-2px)}80%{transform:translate(4px,2px)}}@keyframes megaClear{0%{filter:saturate(1) brightness(1)}35%{filter:saturate(2.2) brightness(1.35)}100%{filter:saturate(1) brightness(1)}}@keyframes charEnter{0%{opacity:0;transform:translateY(22px) scale(.9)}100%{opacity:1;transform:translateY(0) scale(1)}}@keyframes orbFloat{0%{opacity:0;transform:translateY(20px) scale(.4)}12%{opacity:.7}100%{opacity:0;transform:translateY(-120px) scale(1.3)}}@keyframes pachiShow{0%{opacity:0;transform:translate(-50%,-50%) scale(.2) rotate(-10deg)}14%{opacity:1;transform:translate(-50%,-50%) scale(1.18) rotate(3deg)}72%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.16) rotate(0)}}@keyframes reelStop{0%{transform:translateY(-70px) scale(.8);filter:blur(3px)}70%{transform:translateY(6px) scale(1.08);filter:blur(0)}100%{transform:translateY(0) scale(1)}}
</style>
</head>
<body>
<div id="game"><div id="fade"></div><div id="fx-layer"></div><div id="combo-pop">GREAT!</div><div id="pachi" class="pachi"><div class="label">激アツ</div><div class="reels"><div class="reel">7</div><div class="reel">7</div><div class="reel">7</div></div></div>
<div class="screen active" id="title-screen"><div class="stars" id="stars"></div><div class="title-wrap"><div class="title-badge">Communication Rewind Game</div><div class="title-main">コミュニケーション巻き戻し</div><div class="title-sub">〜 4つの失敗をやり直せ 〜</div><div class="title-card"><strong>コミュニケーションの授業発表</strong>を準備する中で、4種類の失敗が起きます。<br><br>1つ目は<span class="tag-bad">文脈無視の乱入</span>、2つ目は<span class="tag-bad">曖昧な作業依頼</span>、3つ目は<span class="tag-bad">発表中の助け方ミス</span>、4つ目は<span class="tag-bad">前提共有なしの「結局」</span>です。<br><br>まずアカン例を見て、失敗ポップアップ後に<span class="tag-good">会話が続く選択</span>をしてください。</div><button class="start-btn" onclick="startGame()">▶ アカン例を見る</button></div></div>
<div class="screen" id="scene-screen"><div class="scene-bg" id="scene-bg"></div><div class="hud"><div class="scene-label" id="scene-label"></div><div class="progress-dots" id="progress-dots"></div><div class="score-hud">修復数 <span id="score-val">0</span> / 4</div></div><div class="location-tag" id="location-tag"></div><div class="char-area" id="char-area"></div><div class="dialogue-box" id="dlg-box" onclick="handleClick()"><div class="spk-name" id="spk-name"></div><div class="dlg-text" id="dlg-text"></div><div class="click-hint">クリックして続ける ▼</div></div><div class="choice-overlay" id="choice-overlay" style="display:none"><div class="choice-q" id="choice-q"></div><div class="choice-btns" id="choice-btns"></div></div><div class="result-panel" id="result-panel" style="display:none"><div class="res-icon" id="res-icon"></div><div class="res-title" id="res-title"></div><div class="res-text" id="res-text"></div><div class="res-tip" id="res-tip" style="display:none"></div><button class="res-btn" id="res-btn"></button></div></div>
<div class="screen" id="end-screen"><div class="end-wrap"><div class="end-title">🎊 修復完了！</div><div class="end-score" id="end-score"></div><div class="tips-box" id="tips-box"></div><div class="end-msg">4つの違う失敗を、それぞれ別の方法で修復できました。</div><button class="replay-btn" onclick="restartGame()">もう一度プレイする</button></div></div></div>
<script>
const SCENES=[{title:'ステージ1：文脈無視の乱入',location:'📍 教室　発表テーマ相談中',bg:'linear-gradient(180deg,#071830 0%,#050d20 65%,#030810 100%)',chars:{L:{emoji:'🧑‍🤝‍🧑',name:'Aさん・Bさん'},R:{emoji:'🚶',name:'Cさん'}},dialogues:[{spk:'Aさん',side:'L',text:'次の発表、コミュニケーション不全の例を寸劇にするってどう？'},{spk:'Bさん',side:'L',text:'いいね。相手の話題を無視して、急に別の話をする例が分かりやすそう。'},{spk:'Cさん',side:'R',text:'あんたって妹と最近どうなん'},{spk:'Aさん',side:'L',text:'？'},{spk:'Bさん',side:'L',text:'？'},{spk:'Cさん',side:'R',text:'🛬🕋'}],failText:'失敗した！会話に入る直前からやり直せ。',choiceQ:'⚡ やり直し：Cさんはどう入る？',choices:[{type:'bad',label:'「妹と最近どうなん」',sub:'文脈確認なしで乱入する',after:[{spk:'Cさん',side:'R',text:'妹と最近どうなん'},{spk:'Aさん',side:'L',text:'いや、今その話してないけど……'}],rewind:'失敗した！また話題を壊した。やり直せ。'},{type:'good',label:'「今の話、入ってもいい？」',sub:'話題確認と参加許可をする',after:[{spk:'Cさん',side:'R',text:'今、授業の発表について話してた？ 途中から聞こえたんだけど、入ってもいい？'},{spk:'Aさん',side:'L',text:'うん、コミュニケーション不全の例を考えてた。'},{spk:'Bさん',side:'L',text:'入って大丈夫。何か案ある？'}],tip:'💡 修復：途中参加では、まず話題確認と参加許可をする。乱入ではなく参加になる。'}]},{title:'ステージ2：曖昧な作業依頼',location:'📍 図書館　発表資料づくり',bg:'linear-gradient(180deg,#092417 0%,#06140c 65%,#020805 100%)',chars:{L:{emoji:'🧑',name:'Aさん'},R:{emoji:'👩',name:'Bさん'}},dialogues:[{spk:'Aさん',side:'L',text:'俺、用事あるから先に帰るわ。資料、いい感じにしといて。'},{spk:'Bさん',side:'R',text:'いい感じって、どこまで？'},{spk:'Aさん',side:'L',text:'そこは任せる。発表で困らない感じ。'},{spk:'Bさん',side:'R',text:'えっと……じゃあデザインだけ整えておくね。'},{spk:'Aさん',side:'L',text:'翌日：なんで内容が増えてないの？ 発表で困るじゃん。'},{spk:'Bさん',side:'R',text:'それをやるって聞いてないよ……'}],failText:'失敗した！作業を頼む直前からやり直せ。',choiceQ:'⚡ やり直し：Aさんはどう頼む？',choices:[{type:'bad',label:'「発表で困らない感じで」',sub:'完成条件を曖昧にしたまま頼む',after:[{spk:'Aさん',side:'L',text:'発表で困らない感じでお願い。'},{spk:'Bさん',side:'R',text:'だから、その困らない感じが分からない……'}],rewind:'失敗した！曖昧なまま押し付けた。やり直せ。'},{type:'good',label:'「担当・期限・完成条件」を言う',sub:'何をどこまでやるか明確にする',after:[{spk:'Aさん',side:'L',text:'ごめん、先に帰るから、Bさんはスライド3〜5枚目の文章を短くして、今日20時までに共有してくれる？ 画像探しは俺が帰ってからやる。'},{spk:'Bさん',side:'R',text:'それなら分かる。文章の整理だけ今日20時までね。'},{spk:'Aさん',side:'L',text:'ありがとう。終わったらチャットに送って。確認する。'}],tip:'💡 修復：依頼では「担当・期限・完成条件」を言う。いい感じ、任せる、適当に、はズレやすい。'}]},{title:'ステージ3：発表中の助け方ミス',location:'📍 発表本番　前に出て発表中',bg:'linear-gradient(180deg,#20102a 0%,#120817 65%,#07030a 100%)',chars:{L:{emoji:'👩‍🏫',name:'Bさん'},R:{emoji:'🧑',name:'Aさん'}},dialogues:[{spk:'Bさん',side:'L',text:'えっと、この場面では……相手の……えー……'},{spk:'Aさん',side:'R',text:'そこ違う。もういい、俺が説明する。'},{spk:'Bさん',side:'L',text:'え……'},{spk:'Aさん',side:'R',text:'これは文脈を確認しないと会話が止まる、という話です。'},{spk:'Bさん',side:'L',text:'……'},{spk:'観客',side:'R',text:'助けたというより、発表を奪った感じになってる……'}],failText:'失敗した！Bさんが詰まった場面からやり直せ。',choiceQ:'⚡ やり直し：Aさんはどう助ける？',choices:[{type:'bad',label:'「もういい、俺が説明する」',sub:'相手を否定して発表を奪う',after:[{spk:'Aさん',side:'R',text:'もういい、俺が説明する。'},{spk:'Bさん',side:'L',text:'……'}],rewind:'失敗した！相手を助けずに発表を奪った。やり直せ。'},{type:'good',label:'「補足すると〜です」',sub:'相手の発表を残したまま助ける',after:[{spk:'Aさん',side:'R',text:'補足すると、この場面では「相手の話題を確認せずに入る」と会話が止まりやすい、という例です。'},{spk:'Bさん',side:'L',text:'そうです。なので、改善後は最初に「今の話に入ってもいい？」と確認します。'},{spk:'Aさん',side:'R',text:'Bさんの説明に付け加えると、相手の立場を残したまま話すことも大事です。'}],tip:'💡 修復：相手が詰まったときは、否定して奪うのではなく「補足」として助ける。相手の発表者としての立場を残す。'}]},{title:'ステージ4：前提共有なしの「結局」',location:'📍 放課後　教室の出口付近',bg:'linear-gradient(180deg,#2a1b08 0%,#140d05 65%,#080402 100%)',chars:{L:{emoji:'🧑',name:'Aさん'},R:{emoji:'🎒',name:'Dさん'}},dialogues:[{spk:'Aさん',side:'L',text:'今日の発表、資料の順番だけ帰る前に確認しよう。'},{spk:'Dさん',side:'R',text:'結局さ、夜店いくん？'},{spk:'Aさん',side:'L',text:'え、夜店？'},{spk:'Dさん',side:'R',text:'だから、結局どうするんって話。'},{spk:'Aさん',side:'L',text:'ごめん、何の話か分からない。今は発表資料の話をしてた。'}],failText:'失敗した！「結局」の前提を共有する直前からやり直せ。',choiceQ:'⚡ やり直し：Dさんはどう聞く？',choices:[{type:'bad',label:'「結局さ、夜店いくん？」',sub:'前提を言わずに聞く',after:[{spk:'Dさん',side:'R',text:'結局さ、夜店いくん？'},{spk:'Aさん',side:'L',text:'結局って、何の話？'}],rewind:'失敗した！「結局」の前提が共有されていない。やり直せ。'},{type:'good',label:'「この前話してた夜店の件だけど…」',sub:'先に何の話か共有する',after:[{spk:'Dさん',side:'R',text:'ごめん、発表の話の途中で一つだけ確認していい？ この前話してた、駅前の祭りの夜店に行くかどうかの件なんだけど、今日決める？'},{spk:'Aさん',side:'L',text:'ああ、その話ね。発表資料を確認したあとで決めよう。'},{spk:'Dさん',side:'R',text:'了解。じゃあ資料の確認が終わったらまた聞く。'}],tip:'💡 修復：「結局」は、過去の話題を相手も覚えている前提の言葉。先に「何の件か」を言うと通じやすい。'}]}];
let sceneIdx=0,dlgIdx=0,score=0,phase='dlg',chosen=null,afterIdx=0,typing=false,typeTimer=null,fullTxt='';function initStars(){const c=document.getElementById('stars');c.innerHTML='';for(let i=0;i<120;i++){const s=document.createElement('div');s.className='star';const z=Math.random()*2.5+.5;s.style.cssText=`width:${z}px;height:${z}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${(Math.random()*3+2).toFixed(1)}s`;c.appendChild(s)}}function fade(to,cb){const el=document.getElementById('fade');el.style.opacity=to;el.style.pointerEvents=to>0?'all':'none';if(cb)setTimeout(cb,420)}function showScreen(id){fade(.6,()=>{document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');fade(0,null)})}function startGame(){sceneIdx=0;score=0;showScreen('scene-screen');setTimeout(loadScene,450)}function restartGame(){sceneIdx=0;score=0;showScreen('scene-screen');setTimeout(loadScene,450)}function loadScene(){const s=SCENES[sceneIdx],screen=document.getElementById('scene-screen');dlgIdx=0;phase='dlg';chosen=null;afterIdx=0;screen.classList.remove('stage-enter');void screen.offsetWidth;screen.classList.add('stage-enter');document.getElementById('scene-bg').style.background=s.bg;document.getElementById('scene-label').textContent=s.title;document.getElementById('location-tag').textContent=s.location;updateDots();updateScore(false);document.getElementById('choice-overlay').style.display='none';document.getElementById('result-panel').style.display='none';document.getElementById('dlg-box').style.display='flex';renderChars(null);showDlg(s.dialogues[0])}function updateDots(){const el=document.getElementById('progress-dots');el.innerHTML='';SCENES.forEach((_,i)=>{const d=document.createElement('div');d.className='dot'+(i<sceneIdx?' done':i===sceneIdx?' active':'');el.appendChild(d)})}function updateScore(bump=true){const el=document.getElementById('score-val');el.textContent=score;if(bump){el.classList.remove('bump');void el.offsetWidth;el.classList.add('bump')}}function renderChars(speakSide){const s=SCENES[sceneIdx],area=document.getElementById('char-area');area.innerHTML='';['L','R'].forEach(side=>{const ch=s.chars[side],box=document.createElement('div');box.className='char-box'+(speakSide===side?' speaking':speakSide!==null?' dim':'');box.innerHTML=`<span class="char-emoji">${ch.emoji}</span><div class="char-name">${ch.name}</div>`;area.appendChild(box)})}function typewrite(el,txt,done){typing=true;fullTxt=txt;el.textContent='';let i=0;function step(){if(i<txt.length){el.textContent+=txt[i++];typeTimer=setTimeout(step,28)}else{typing=false;if(done)done()}}step()}function skipType(){if(typeTimer)clearTimeout(typeTimer);typing=false;document.getElementById('dlg-text').textContent=fullTxt}function showDlg(d){const n=document.getElementById('spk-name'),t=document.getElementById('dlg-text');n.textContent=d.spk;n.className='spk-name'+(d.internal?' internal':'');t.className='dlg-text'+(d.internal?' internal':'');renderChars(d.side||null);typewrite(t,d.text,null)}function handleClick(){if(typing){skipType();return}advancePhase()}function advancePhase(){const s=SCENES[sceneIdx];if(phase==='dlg'){dlgIdx++;if(dlgIdx<s.dialogues.length)showDlg(s.dialogues[dlgIdx]);else showFailPopupBeforeChoice()}else if(phase==='after'){afterIdx++;const arr=chosen.after;if(afterIdx<arr.length)showDlg(arr[afterIdx]);else showResult()}}function showFailPopupBeforeChoice(){document.getElementById('dlg-box').style.display='none';renderChars(null);failBurst();const p=document.getElementById('result-panel');p.className='result-panel bad';document.getElementById('res-icon').textContent='❌';document.getElementById('res-title').textContent='失敗した！やり直せ';document.getElementById('res-text').textContent=SCENES[sceneIdx].failText;document.getElementById('res-tip').style.display='none';const b=document.getElementById('res-btn');b.textContent='やり直す';b.onclick=showChoices;p.style.display='block';phase='preChoice'}function showChoices(){const s=SCENES[sceneIdx];document.getElementById('result-panel').style.display='none';document.getElementById('dlg-box').style.display='none';renderChars(null);document.getElementById('choice-q').textContent=s.choiceQ;const btns=document.getElementById('choice-btns');btns.innerHTML='';s.choices.forEach((c,i)=>{const b=document.createElement('button');b.className=`choice-btn ${c.type}`;b.innerHTML=`<div class="btn-label">${c.label}</div><div class="btn-sub">${c.sub}</div>`;b.onclick=()=>selectChoice(i);btns.appendChild(b)});document.getElementById('choice-overlay').style.display='block';pachi('CHANCE','？','？','？');particles(10,['✨','⚡','👀'],'choice');phase='choice'}function selectChoice(idx){chosen=SCENES[sceneIdx].choices[idx];document.getElementById('choice-overlay').style.display='none';document.getElementById('dlg-box').style.display='flex';phase='after';afterIdx=0;if(chosen.type==='good'){pachi('激アツ','7','?','?');choiceSpark()}else failBurst();showDlg(chosen.after[0])}function showResult(){document.getElementById('dlg-box').style.display='none';const p=document.getElementById('result-panel'),icon=document.getElementById('res-icon'),title=document.getElementById('res-title'),text=document.getElementById('res-text'),tip=document.getElementById('res-tip'),btn=document.getElementById('res-btn');if(chosen.type==='bad'){failBurst();p.className='result-panel bad';icon.textContent='❌';title.textContent='失敗した！やり直せ';text.textContent=chosen.rewind||'失敗した！やり直せ。';tip.style.display='none';btn.textContent='やり直す';btn.onclick=showChoices}else{score++;updateScore();rewardBurst(score===SCENES.length?'clear':'good');pachi(score===SCENES.length?'大当たり':'確変','7','7','7');p.className='result-panel good';icon.textContent='✅';title.textContent='いい感じ！';text.textContent='会話が止まらず、次の場面へ進めるようになりました。';tip.style.display='block';tip.textContent=chosen.tip;if(sceneIdx<SCENES.length-1){btn.textContent='次へ →';btn.onclick=nextScene}else{btn.textContent='ゲームクリア！ 🎊';btn.onclick=showEnd}}p.style.display='block';phase='result'}function nextScene(){document.getElementById('result-panel').style.display='none';sceneIdx++;loadScene()}function showEnd(){rewardBurst('clear');document.getElementById('end-screen').classList.add('mega-clear');showScreen('end-screen');setTimeout(()=>{const sc=document.getElementById('end-score');sc.innerHTML=`⭐ ${score} / 4 ⭐<br><span style="font-size:18px;color:#ff9">全場面修復！</span>`;sc.style.color='#ffd';const box=document.getElementById('tips-box');box.innerHTML='<div class="tips-heading">📋 修復した内容</div>';SCENES.forEach((s,i)=>{const good=s.choices.find(c=>c.type==='good'),row=document.createElement('div');row.className='tip-row';row.style.animationDelay=`${i*80}ms`;row.innerHTML=`<div class="tip-num">${i+1}</div><div class="tip-body"><strong>${s.title}</strong><br>${good.tip.replace('💡 修復：','')}</div>`;box.appendChild(row)})},500)}function flash(kind){const layer=document.getElementById('fx-layer'),f=document.createElement('div');f.className='fx-flash'+(kind==='fail'?' fail':'');layer.appendChild(f);setTimeout(()=>f.remove(),500)}function particles(count,bank,mode){const layer=document.getElementById('fx-layer');for(let i=0;i<count;i++){const p=document.createElement('div'),x=mode==='choice'?18+Math.random()*64:35+Math.random()*30,y=mode==='choice'?60+Math.random()*18:34+Math.random()*24,dx=(Math.random()-.5)*(mode==='choice'?420:900),dy=-80-Math.random()*(mode==='choice'?260:520),rot=(Math.random()>.5?1:-1)*(220+Math.random()*720),size=18+Math.random()*34,time=650+Math.random()*900;p.className='fx-particle';p.textContent=bank[Math.floor(Math.random()*bank.length)];p.style.cssText=`--x:${x}vw;--y:${y}vh;--dx:${dx}px;--dy:${dy}px;--rot:${rot}deg;--s:${size}px;--time:${time}ms`;layer.appendChild(p);setTimeout(()=>p.remove(),time+80)}}function popText(text){const c=document.getElementById('combo-pop');c.textContent=text;c.classList.remove('show');void c.offsetWidth;c.classList.add('show')}function shake(){const s=document.getElementById('scene-screen');s.classList.remove('juice');void s.offsetWidth;s.classList.add('juice')}function pachi(label,a,b,c){const el=document.getElementById('pachi');el.querySelector('.label').textContent=label;const reels=el.querySelectorAll('.reel');[a,b,c].forEach((v,i)=>reels[i].textContent=v);el.classList.remove('show');void el.offsetWidth;el.classList.add('show')}function choiceSpark(){particles(24,['✨','💫','✅','🌟','⚡'],'choice');popText('NICE!')}function rewardBurst(kind){flash('good');shake();particles(kind==='clear'?140:70,['✨','⭐','💥','🎉','💫','🔥','✅','🌈','🍬','🧠','💎']);popText(kind==='clear'?'FULL COMBO!!':'GOOD!!')}function failBurst(){flash('fail');shake();particles(18,['💢','❌','⚠️','🌀']);popText('MISS!')}function ambientOrb(){const layer=document.getElementById('fx-layer'),o=document.createElement('div'),s=8+Math.random()*24,x=Math.random()*100,y=78+Math.random()*18,t=3000+Math.random()*3000;o.className='ambient-orb';o.style.cssText=`left:${x}vw;top:${y}vh;width:${s}px;height:${s}px;--t:${t}ms`;layer.appendChild(o);setTimeout(()=>o.remove(),t+80)}initStars();setInterval(ambientOrb,1400);
</script>
